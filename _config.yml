# Site settings
title: Gerald Tuimalealiifano
email: tui.gerald@gmail.com
url: https://geraldtui.com

# Formspree form ID for the contact form (https://formspree.io).
# Create a form in your Formspree account (signed up with the email above),
# then paste the ID that appears after /f/ in your endpoint URL.
formspree_id: xaqzydag
description: "Write an awesome description for your new site here. You can edit this line in _config.yml. It will appear in your document head meta (for Google search results) and in your feed.xml site description."
keywords: "your keywords, separated by commas"
skills: "Software Engineer - Project Manager - IT Consultant"
meta_author: Gerald Tuimalealiifano

# Google webmaster tools
google_verify:

# https://ssl.bing.com/webmaster/configure/verify/ownership Option 2 content= goes here
bing_verify:

# Contact form:
# - static : pass through formspree.io to validate email sending
# - disqus : replace contact form by disqus thread
# - comment the line below if you want to stick with the default PHP contact form
contact: static

# If you use disqus you need disqus shortname
# https://help.disqus.com/customer/portal/articles/466208
disqus_shortname: myshortname

# Color settings (hex-codes without the leading hash-tag)
# Monochromatic charcoal palette with a purple accent.
color:
  primary: 7c3aed       # purple accent
  primary-rgb: "124,58,237"
  primary-dark: 6d28d9  # deeper purple for hover/active states
  secondary: 1f2430     # charcoal (footer / dark sections)
  secondary-dark: 14171f # near-black
  text: 1f2430          # default body text
  muted: 6b7280         # muted grey for secondary text
  surface: f5f6f8       # light grey section background

# Footer settings
footer:
  copyright: Gerald Tui 2026

# Social networks usernames (many more available: google-plus, flickr, dribbble, pinterest, instagram, tumblr, linkedin, etc.)
social:

# Postal address (add as many lines as necessary)
address:

# Credits content
credits:

# Build settings
markdown: kramdown
permalink: pretty

#for posts (project case-studies; rendered inside modals on the home page)
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      permalink: "/projects/:title/"
